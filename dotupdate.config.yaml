# Configuration for dotupdate.py
# Files and directories to ignore when discovering dotfiles in the repository

ignore_items:
  # Git files
  - .git
  - .gitignore
  - .gitconfig

  # dotupdate files
  - dotupdate.py
  - dotupdate.config.yaml
  - Makefile

  - old
  - .config/github-copilot
  - .config/gcloud
  - .config/mps-youtube
  - .config/configstore
  - .config/iterm2/AppSupport/parsers/

  # iTerm2: AppSupport is a symlink to ~/Library/Application Support/iTerm2
  # and is preserved as a symlink — no need to ignore its contents here.
  # sockets/secrets contains AI credentials and must not be committed.
  - .config/iterm2/sockets
